        <nav>

            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>

<main>
  <le>
    <h1>White Water Rafting Company</h1>
    <p>175 5th Ave</p>
    <p>New York, NY 10010<</p>
    <p>+1 999 999 999</p>
    <p>info@whitewater.com</p>
  </le>
<div class="contact-container">
  <iframe src=  "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1069.8005280593172!2d-73.98041498803019!3d40.677211498870186!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c25baa5a37cb5f%3A0x94bd6f7afec0327b!2s175%205th%20Ave%2C%20Brooklyn%2C%20NY%2011217%2C%20EE.%20UU.!5e0!3m2!1ses-419!2sve!4v1775874390990!5m2!1ses-419!2sve" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe> 
    <form>
      <label for="fullname">Name</label>
      <input type="text" id="fullname" name="fullname" placeholder="Placeholder" required>

      <label for="useremail">Email</label>
      <input type="email" id="useremail" name="useremail" placeholder="Placeholder" required>

      <label>Message Purpose</label>
      <div class="radio-group">
        <input type="radio" id="question1" name="purpose"><label for="question1">General Inquiry</label>
      </div>
      <div class="radio-group">
        <input type="radio" id="question2" name="purpose"><label for="question2">Reservation Question</label>
      </div>
      <div class="radio-group">
        <input type="radio" id="question3" name="purpose"><label for="question3">Website Suggestion</label>
      </div>

      <label for="feedback">Message</label>
      <textarea id="feedback" name="feedback" rows="4" placeholder="Type here"></textarea>

      <div>
        <input type="checkbox" id="subscription" name="subscription">
        <label for="subscription">Please subscribe me to the monthly newsletter</label>
      </div>

      <button type="submit">Get in Touch!</button>
    </form>
  </div>

  <section class="employee">
    <h2>We Are Here To Serve You</h2>
    <div class="employee-list">
        <img src="images/employee_p1.jpg" alt="Employee Profile">
        <img src="images/employee_p2.jpg" alt="Employee Profile">
        <img src="images/employe_p3.jpg" alt="Employee Profile">
    </div>
  </section>
</main>
